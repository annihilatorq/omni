name: Windows Clang-cl

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (${{ matrix.arch.name }}, ${{ matrix.build_type }}, ${{ matrix.exceptions.name }})
    runs-on: windows-2025-vs2026
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        std: [23]
        exceptions:
          - name: Exceptions
            build_dir_suffix: exceptions
            disable_exceptions: OFF
          - name: No Exceptions
            build_dir_suffix: no-exceptions
            disable_exceptions: ON
        arch:
          - name: x64
            cmake_arch: x64
            msvc_arch: x64
            build_dir_suffix: x64
          - name: x86
            cmake_arch: Win32
            msvc_arch: amd64_x86
            build_dir_suffix: x86

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch.msvc_arch }}

      - name: Configure CMake
        shell: pwsh
        run: |
          $buildDir = "${{ github.workspace }}/${{ matrix.arch.build_dir_suffix }}-${{ matrix.build_type }}-${{ matrix.exceptions.build_dir_suffix }}"
          cmake -S "${{ github.workspace }}" -B $buildDir `
            -G "Visual Studio 18 2026" `
            -A "${{ matrix.arch.cmake_arch }}" `
            -T "ClangCL,host=x64" `
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} `
            -DCMAKE_CXX_STANDARD_REQUIRED=ON `
            -DCMAKE_CXX_EXTENSIONS=OFF `
            -DOMNI_DISABLE_EXCEPTIONS=${{ matrix.exceptions.disable_exceptions }} `
            -DCMAKE_CXX_FLAGS_DEBUG="/bigobj"

      - name: Build
        shell: pwsh
        run: |
          $buildDir = "${{ github.workspace }}/${{ matrix.arch.build_dir_suffix }}-${{ matrix.build_type }}-${{ matrix.exceptions.build_dir_suffix }}"
          cmake --build $buildDir --config ${{ matrix.build_type }} --parallel

      - name: Test
        shell: pwsh
        run: |
          $buildDir = "${{ github.workspace }}/${{ matrix.arch.build_dir_suffix }}-${{ matrix.build_type }}-${{ matrix.exceptions.build_dir_suffix }}"
          ctest --test-dir $buildDir --output-on-failure --timeout 120 -C ${{ matrix.build_type }}